name: Build and deploy docs to GitHub Pages

# Builds the static docs site (docs/*.md + CHANGELOG.md + gh-pages/) and publishes it via
# GitHub Pages. Set Settings -> Pages -> Source to "GitHub Actions" once. The built site is
# also committed at gh-pages/public/ (kept in sync by the .githooks pre-commit hook and the
# docs-fresh CI check); this workflow rebuilds and deploys it rather than serving the commit.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'gh-pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: pip install -e ".[docs]"
      - name: Build site
        run: python3 gh-pages/build_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
