name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) -- no API token is stored as a secret. One-time setup
# on PyPI: add this repo as a trusted publisher for the `forterp` project, workflow
# `release.yml`, environment `forterp-pypi`. Cut a release by tagging, e.g.:
#     git tag v0.1.0 && git push origin v0.1.0
# The tag should match forterp.__version__ (the version baked into the build).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with dev extras) + build tools
        run: pip install -e ".[dev]" build twine
      - name: Lint, format-check, and test
        run: |
          ruff check src tests
          ruff format --check src tests
          pytest -q
      - name: Verify the tag matches forterp.__version__
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ver=$(python -c "import forterp; print(forterp.__version__)")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' does not match forterp.__version__ '$ver'"
            exit 1
          fi
          echo "tag matches version $ver"
      - name: Build sdist + wheel
        run: |
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: forterp-pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC); no PyPI token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
