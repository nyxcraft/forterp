<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">forterp logo</title>
  <desc id="desc">A cream manual card showing a sage-green block letter F above a row of five cells — the PDP-10's five characters per word.</desc>
  <rect width="96" height="96" rx="20" fill="#f1f0e2"/>
  <rect x="6" y="6" width="84" height="84" rx="16" fill="none" stroke="#4f6147" stroke-width="2"/>
  <!-- block-letter F, monospace feel -->
  <g fill="#4f6147">
    <rect x="31" y="24" width="10" height="40" rx="1.5"/>
    <rect x="31" y="24" width="30" height="10" rx="1.5"/>
    <rect x="31" y="40" width="22" height="9" rx="1.5"/>
  </g>
  <!-- five cells = the PDP-10's 5 chars per 36-bit word; a light→deep sage ramp, last a brass cursor -->
  <g>
    <rect x="22" y="70" width="9" height="9" rx="1.5" fill="#dfe6d0"/>
    <rect x="34" y="70" width="9" height="9" rx="1.5" fill="#b8c7a8"/>
    <rect x="46" y="70" width="9" height="9" rx="1.5" fill="#8aa07b"/>
    <rect x="58" y="70" width="9" height="9" rx="1.5" fill="#4f6147"/>
    <rect x="70" y="70" width="9" height="9" rx="1.5" fill="#b07a2b"/>
  </g>
</svg>
